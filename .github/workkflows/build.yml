name: Build Windows EXE

on:
  push:
    tags:
      - 'v*' # Triggers when you create a tag like v1.0

jobs:
  build:
    runs-on: windows-latest # Runs on a Windows server
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          # Bundles all specific file types from the root folder
          pyinstaller --onefile --windowed `
            --add-data "*.html;." `
            --add-data "*.css;." `
            --add-data "*.js;." `
            --add-data "*.bat;." `
            --add-data "*.ps1;." `
            main.py  # REPLACE with your main script name

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/GameBot.exe # REPLACE main.exe with your output name   
