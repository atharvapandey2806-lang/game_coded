 name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          # Ensure main.py exists
          dir *.py 
          # Run PyInstaller
          pyinstaller --onefile --windowed `
            --add-data "*.html;." `
            --add-data "*.css;." `
            --add-data "*.js;." `
            --add-data "*.bat;." `
            --add-data "*.ps1;." `
            main.py
          
          # DEBUG: List contents of dist folder to verify file name
          dir dist

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Use a wildcard to be safe, or ensure the name matches exactly what 'dir dist' showed
          files: dist/*.exe 
          # If the upload fails because the release already exists, add:
          # fail_on_unmatched_files: true    
