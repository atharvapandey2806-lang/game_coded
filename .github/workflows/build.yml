name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write # Crucial for uploading releases
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        run: |
          # 1. List files to ensure Python/HTML files are present
          dir
          
          # 2. Run PyInstaller
          # Replace 'main.py' with your actual main script name
          pyinstaller --onefile --windowed ^
            --add-data "*.html;." ^
            --add-data "*.css;." ^
            --add-data "*.js;." ^
            --add-data "*.bat;." ^
            --add-data "*.ps1;." ^
            main.py

      - name: DEBUG - Check Output
        run: |
          # This step proves if the .exe exists before uploading
          echo "Contents of dist folder:"
          dir dist
          
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          # Use wildcard to catch ANY .exe file in the dist folder
          files: dist/*.exe
          # If the release already exists, this prevents failure
          fail_on_unmatched_files: true 
