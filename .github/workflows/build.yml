name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        shell: pwsh
        run: |
          # ONLY includes extensions confirmed to exist in your root folder
          # Removed *.css and *.js because they caused the "Unable to find" error
          pyinstaller --onefile --windowed `
            --add-data "*.html;." `
            --add-data "*.bat;." `
            --add-data "*.ps1;." `
            gamebot_multiplayer_server.py

      - name: DEBUG - Check Output
        shell: pwsh
        run: |
          Write-Host "Contents of dist folder:"
          Get-ChildItem dist

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        with:
          files: dist/*.exe   
