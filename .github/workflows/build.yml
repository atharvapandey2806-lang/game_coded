name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        shell: pwsh
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Executable
        shell: pwsh
        run: |
          # Changed target file to gamebot.py
          pyinstaller --onefile --windowed `
            --add-data "*.html;." `
            --add-data "*.bat;." `
            --add-data "*.ps1;." `
            gamebot.py

      - name: DEBUG - Check Output
        shell: pwsh
        run: |
          Write-Host "Contents of dist folder:"
          Get-ChildItem dist

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          # Attaches to v1.0 if running manually, or the specific tag if pushed
          tag_name: ${{ github.ref_name == 'main' && 'v1.0' || github.ref_name }}   
